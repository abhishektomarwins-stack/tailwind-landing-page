<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexcent</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="bg-white font-sans text-text">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur">
      <div
        class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4 sm:px-6 md:h-20 lg:px-8">

        <a href="#"
          class="flex min-w-0 items-center gap-2 text-lg font-bold text-heading no-underline sm:text-xl">
          <img src="src/assets/images/svg/logo.svg" alt="Nexcent logo"
            class="h-8 w-8 shrink-0" />
          Nexcent
        </a>

        <nav class="hidden items-center gap-6 md:flex lg:gap-8"
          aria-label="Primary navigation">
          <a href="#"
            class="text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Home</a>
          <a href="#"
            class="text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Features</a>
          <a href="#"
            class="text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Community</a>
          <a href="#"
            class="text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Blog</a>
          <a href="#"
            class="text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Pricing</a>
        </nav>

        <button
          class="inline-flex cursor-pointer items-center gap-2 border-0 bg-primary px-6 py-3 text-sm font-semibold text-white transition-[background-color,box-shadow] duration-300 hover:bg-primary-dark hover:shadow-primary max-md:hidden">
          Register Now
          <i class="fa-solid fa-arrow-right text-base" aria-hidden="true"></i>
        </button>

        <button
          class="inline-flex h-10 w-10 cursor-pointer items-center justify-center border border-border-soft bg-white text-heading transition-colors duration-300 hover:border-primary hover:text-primary md:hidden"
          type="button"
          id="mobileMenuButton"
          aria-controls="mobileMenu"
          aria-expanded="false"
          aria-label="Open menu">
          <i class="fa-solid fa-bars text-lg" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Mobile menu -->
      <div
        class="hidden border-t border-border-soft bg-surface px-4 pb-5 pt-2 shadow-sm sm:px-6 md:hidden"
        id="mobileMenu">
        <nav class="flex flex-col" aria-label="Mobile navigation">
          <a href="#"
            class="border-b border-border-soft py-3 text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Home</a>
          <a href="#"
            class="border-b border-border-soft py-3 text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Features</a>
          <a href="#"
            class="border-b border-border-soft py-3 text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Community</a>
          <a href="#"
            class="border-b border-border-soft py-3 text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Blog</a>
          <a href="#"
            class="py-3 text-sm font-medium text-heading no-underline transition-colors duration-300 hover:text-primary">Pricing</a>
        </nav>
        <button
          class="mt-3 inline-flex w-full cursor-pointer items-center justify-center gap-2 border-0 bg-primary px-6 py-3 text-sm font-semibold text-white transition-[background-color,box-shadow] duration-300 hover:bg-primary-dark hover:shadow-primary">
          Register Now
          <i class="fa-solid fa-arrow-right text-base" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <section class="bg-surface">
      <div
        class="mx-auto max-w-6xl flex flex-col items-center justify-between gap-10 px-4 py-16 sm:px-6 lg:flex-row lg:px-8 lg:py-24">

        <div class="max-w-xl text-center lg:text-left">
          <h1
            class="text-4xl font-semibold leading-tight tracking-tight text-heading sm:text-5xl xl:text-5xl">
            Lessons and insights
            <span class="block text-primary">from 8 years</span>
          </h1>
          <p class="mt-6 text-base leading-8 text-text">
            Where to grow your business as a photographer: site or social media?
          </p>
          <div class="mt-10 flex justify-center lg:justify-start">
            <a href="#"
              class="inline-flex items-center justify-center rounded bg-primary px-8 py-4 text-sm font-semibold text-white shadow-primary transition duration-300 hover:bg-primary-dark">
              Register
            </a>
          </div>
        </div>

        <div class="w-full max-w-md shrink-0">
          <img src="src/assets/images/banner.webp"
            alt="Business dashboard illustration"
            class="mx-auto w-full object-contain" />
        </div>

      </div>

      <div class="flex items-center justify-center gap-2 pb-10"
        aria-label="Slide indicators">
        <span class="h-3 w-3 rounded-full bg-primary"></span>
        <span class="h-2 w-2 rounded-full bg-gray-300"></span>
        <span class="h-2 w-2 rounded-full bg-gray-300"></span>
      </div>
    </section>

  </body>
</html>
